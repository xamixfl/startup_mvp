<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pulse — чаты</title>
  
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #eef2f7;
      color: #1e293b;
      height: 100vh;
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-columns: 320px 1fr 0;
      height: 100vh;
    }

    .sidebar {
      background: white;
      border-right: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .sidebar-header {
      padding: 16px;
      font-weight: 700;
      font-size: 18px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-back-btn {
      width: 46px;
      height: 30px;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      color: #334155;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      line-height: 1;
      transition: all 0.2s;
    }

    .sidebar-back-btn:hover {
      background: #eef2ff;
      border-color: #c7d2fe;
    }

    .chat-list {
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      height: calc(100vh - 56px);
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 12px 16px;
      border-top: 1px solid #e2e8f0;
      font-size: 12px;
      color: #64748b;
    }

    .sidebar-footer a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }

    .sidebar-footer a:hover {
      text-decoration: underline;
    }

    .chat-item {
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      border: 1px solid transparent;
    }

    .chat-item.active {
      background: #eff6ff;
      border-color: #bfdbfe;
    }

    .chat-item-admin {
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
      border: 1px solid #fbbf24;
      position: relative;
      box-shadow: 0 2px 4px rgba(251, 191, 36, 0.1);
    }

    .chat-item-admin:hover {
      background: linear-gradient(135deg, #fde68a 0%, #fcd34d 100%);
      border-color: #f59e0b;
      box-shadow: 0 4px 6px rgba(251, 191, 36, 0.2);
    }

    .chat-item-admin.active {
      background: linear-gradient(135deg, #fde68a 0%, #fcd34d 100%);
      border-color: #f59e0b;
      box-shadow: 0 4px 8px rgba(251, 191, 36, 0.3);
    }

    .chat-item-admin .chat-item-title {
      color: #92400e;
      font-weight: 700;
    }

    .chat-item-title {
      font-weight: 600;
      font-size: 14px;
      color: #0f172a;
    }

    .chat-item-sub {
      font-size: 12px;
      color: #64748b;
      margin-top: 4px;
    }

    .chat-item-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .chat-unread {
      background: #3b82f6;
      color: white;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 600;
      min-width: 22px;
      text-align: center;
    }

    .main {
      display: flex;
      flex-direction: column;
      background: #f8fafc;
      position: relative;
      min-height: 0;
    }

    .chat-header {
      height: 56px;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      position: relative;
    }

    .chat-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .chat-title {
      font-weight: 700;
      cursor: pointer;
    }

    .typing-indicator {
      font-size: 12px;
      color: #64748b;
      margin-left: 12px;
    }

    .chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background-image: linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
      min-height: 0;
    }

    .message {
      position: relative;
      max-width: 70%;
      padding: 10px 12px 24px;
      border-radius: 12px;
      background: white;
      border: 1px solid #e2e8f0;
      align-self: flex-start;
      box-shadow: 0 8px 24px rgba(148, 163, 184, 0.08);
    }

    .message.system {
      align-self: center;
      max-width: 60%;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 999px;
      padding: 6px 14px;
      font-weight: 600;
      color: #475569;
      box-shadow: none;
      text-align: center;
    }

    .message.system .message-meta,
    .message.system .message-time {
      display: none;
    }

    .message.system {
      background: #f8fafc;
      border-color: #dbe4f0;
    }

    .message.system.mine {
      align-self: center;
      background: #f8fafc;
      border-color: #dbe4f0;
    }

    .message.system .message-content {
      color: #475569;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.35;
    }

    .message.mine {
      align-self: flex-end;
      background: #dbeafe;
      border-color: #bfdbfe;
    }

    .message-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      min-height: 28px;
    }

    .message.mine .message-meta {
      justify-content: flex-end;
    }

    .message-avatar {
      width: 28px;
      height: 28px;
      flex: 0 0 28px;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid #e2e8f0;
      background: #f1f5f9;
    }

    .message-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .message-sender {
      font-size: 12px;
      font-weight: 700;
      color: #334155;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .message-content {
      font-size: 14px;
      color: #0f172a;
      line-height: 1.4;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .message-time {
      position: absolute;
      right: 12px;
      bottom: 8px;
      font-size: 11px;
      color: #64748b;
      opacity: 0.9;
      letter-spacing: 0.01em;
    }

    .message.mine .message-time {
      color: #475569;
    }

    .message-date-separator {
      align-self: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid #dbe4f0;
      color: #64748b;
      font-size: 12px;
      font-weight: 600;
      box-shadow: 0 6px 18px rgba(148, 163, 184, 0.14);
      margin: 6px auto 2px;
      backdrop-filter: blur(10px);
    }



    .message-author {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 4px;
    }

    .message-text {
      font-size: 14px;
      color: #0f172a;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .message-image {
      max-width: 240px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      display: block;
    }

    .chat-empty {
      margin: auto;
      color: #94a3b8;
      font-size: 16px;
    }

    .chat-input {
      background: white;
      border-top: 1px solid #e2e8f0;
      padding: 12px 16px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .chat-input textarea {
      flex: 1 1 320px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      resize: none;
      min-height: 42px;
      max-height: 120px;
    }

    .chat-input button {
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .chat-input .btn-attach {
      background: #f1f5f9;
      color: #475569;
      border: 1px solid #e2e8f0;
      padding: 10px 12px;
      font-weight: 700;
    }

    .chat-input .btn-attach:hover {
      background: #e2e8f0;
    }

    .image-preview {
      width: 100%;
      display: none;
      align-items: center;
      gap: 12px;
      padding: 10px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      background: #f8fafc;
    }

    .image-preview img {
      width: 64px;
      height: 64px;
      border-radius: 10px;
      object-fit: cover;
      border: 1px solid #e2e8f0;
    }

    .image-modal {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      padding: 20px;
    }

    .image-modal img {
      max-width: 92vw;
      max-height: 92vh;
      border-radius: 16px;
      background: white;
      border: 1px solid #e2e8f0;
    }

    .image-preview .preview-name {
      flex: 1;
      font-size: 12px;
      color: #475569;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .image-preview .preview-remove {
      border: none;
      background: #fee2e2;
      color: #b91c1c;
      border-radius: 8px;
      padding: 6px 10px;
      font-weight: 700;
      cursor: pointer;
    }

    .info-panel {
      background: white;
      border-left: 1px solid #e2e8f0;
      display: none;
      flex-direction: column;
    }

    .info-content {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 16px;
      overflow-y: auto;
      min-height: 0;
    }

    .info-link {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      padding: 8px 12px;
    }

    .info-link:hover {
      text-decoration: underline;
    }

    .info-profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      background: #f8fafc;
    }

    .info-avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid #e2e8f0;
      background: white;
    }

    .info-name {
      font-weight: 700;
      font-size: 16px;
      color: #0f172a;
      text-decoration: none;
    }

    .info-age {
      font-size: 13px;
      color: #64748b;
    }

    .info-actions {
      display: flex;
      gap: 10px;
      margin-top: 8px;
      width: 100%;
    }

    .direct-clear-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      width: 100%;
    }

    .info-btn {
      flex: 1;
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: 700;
      cursor: pointer;
      font-size: 13px;
    }

    .info-btn.secondary {
      background: #f1f5f9;
      color: #475569;
    }

    .info-btn.secondary:hover {
      background: #e2e8f0;
    }

    .info-btn.danger {
      background: #fee2e2;
      color: #b91c1c;
    }

    .info-btn.danger:hover {
      background: #fecaca;
    }

    .btn-report {
      background: #fef3c7;
      color: #92400e;
      border: 1px solid #fde68a;
      border-radius: 8px;
      padding: 8px 12px;
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
      font-family: 'Poppins', sans-serif;
      transition: all 0.2s;
    }

    .btn-report:hover {
      background: #fde68a;
      border-color: #fcd34d;
    }

    .chat-header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .meeting-card {
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 14px;
      background: white;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .meeting-tag {
      align-self: flex-start;
      background: #fef3c7;
      color: #92400e;
      font-weight: 600;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
    }

    .meeting-title {
      font-weight: 700;
      font-size: 16px;
      color: #0f172a;
      text-decoration: none;
    }

    .meeting-meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 13px;
      color: #64748b;
    }

    .participants-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .participant-item.owner {
      border-color: #93c5fd;
      background: #eff6ff;
    }

    .participant-badge {
      margin-left: auto;
      font-size: 11px;
      font-weight: 800;
      padding: 3px 8px;
      border-radius: 999px;
      background: #dbeafe;
      color: #1d4ed8;
      flex: 0 0 auto;
      white-space: nowrap;
    }

    .info-about {
      font-size: 13px;
      color: #475569;
      line-height: 1.5;
      padding: 10px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      background: white;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .info-interests {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .info-pill {
      background: #e2e8f0;
      color: #334155;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .participant-item {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #1e293b;
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      background: #fff;
    }

    .participant-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid #e2e8f0;
      background: #f1f5f9;
    }

    .participant-item-row {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 8px 10px;
      background: #fff;
    }

    .participant-item-row.owner {
      border-color: #93c5fd;
      background: #eff6ff;
    }

    .participant-item-row .member-link {
      display: flex;
      flex: 1;
      align-items: center;
      gap: 10px;
      color: inherit;
      text-decoration: none;
    }

    .participant-item-row .member-remove {
      border: none;
      background: #fee2e2;
      color: #b91c1c;
      border-radius: 10px;
      padding: 6px 10px;
      font-weight: 700;
      cursor: pointer;
      font-size: 12px;
    }

    .participant-item-row .member-remove:hover {
      background: #fecaca;
    }

    .participant-name {
      font-weight: 600;
      font-size: 14px;
    }

    .participant-age {
      font-size: 12px;
      color: #64748b;
    }

    .app.show-info {
      grid-template-columns: 320px 1fr 320px;
    }

    .app.show-info .info-panel {
      display: flex;
    }
  </style>
</head>
<body>
  <div class="app" id="chat-app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <a href="index.html" class="sidebar-back-btn" title="К ленте" aria-label="К ленте">←</a>
        <span>Чаты</span>
      </div>
      <div class="chat-list" id="chat-list"></div>
      <div class="sidebar-footer">
        Обратная связь:
        <a href="https://t.me/Pu1seApp" target="_blank" rel="noopener">t.me/Pu1seApp</a>
      </div>
    </aside>

    <main class="main">
      <div class="chat-header">
        <div class="chat-header-left">
          <div class="chat-title" id="chat-title">Выберите чат</div>
          <div class="typing-indicator" id="typing-indicator" style="display:none;">Собеседник печатает...</div>
        </div>
        <div class="chat-header-actions">
          <!-- report button removed by request -->
        </div>
      </div>
      <div class="chat-body" id="chat-body">
        <div class="chat-empty">Нет выбранного чата</div>
      </div>
      <div class="chat-input">
        <input id="chat-image-input" type="file" accept="image/*" style="display: none;">
        <button id="chat-attach" class="btn-attach" type="button">Фото</button>
        <div class="image-preview" id="image-preview">
          <img id="image-preview-img" src="" alt="preview">
          <div class="preview-name" id="image-preview-name"></div>
          <button class="preview-remove" type="button" id="image-preview-remove">Убрать</button>
        </div>
        <textarea id="chat-input" placeholder="Сообщение..." disabled></textarea>
        <button id="chat-send" disabled>Отправить</button>
      </div>
    </main>

    <aside class="info-panel" id="info-panel">
      <div class="info-content" id="info-content"></div>
    </aside>
  </div>

  <div class="image-modal" id="image-modal">
    <img id="image-modal-img" src="" alt="image">
  </div>

  <script src="js/api.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/reports-bans.js"></script>
  <script src="js/reporting.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
