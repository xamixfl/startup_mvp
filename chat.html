<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meetup — Чаты</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #eef2f7;
      color: #1e293b;
      height: 100vh;
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-columns: 320px 1fr 0;
      height: 100vh;
    }

    .sidebar {
      background: white;
      border-right: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .sidebar-header {
      padding: 16px;
      font-weight: 700;
      font-size: 18px;
      border-bottom: 1px solid #e2e8f0;
    }

    .chat-list {
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      height: calc(100vh - 56px);
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 12px 16px;
      border-top: 1px solid #e2e8f0;
      font-size: 12px;
      color: #64748b;
    }

    .sidebar-footer a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }

    .sidebar-footer a:hover {
      text-decoration: underline;
    }

    .chat-item {
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      border: 1px solid transparent;
    }

    .chat-item.active {
      background: #eff6ff;
      border-color: #bfdbfe;
    }

    .chat-item-title {
      font-weight: 600;
      font-size: 14px;
      color: #0f172a;
    }

    .chat-item-sub {
      font-size: 12px;
      color: #64748b;
      margin-top: 4px;
    }

    .chat-item-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .chat-unread {
      background: #3b82f6;
      color: white;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 600;
      min-width: 22px;
      text-align: center;
    }

    .main {
      display: flex;
      flex-direction: column;
      background: #f8fafc;
      position: relative;
      min-height: 0;
    }

    .chat-header {
      height: 56px;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
    }

    .chat-title {
      font-weight: 700;
      cursor: pointer;
    }

    .chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background-image: linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
      min-height: 0;
    }

    .message {
      max-width: 70%;
      padding: 10px 12px;
      border-radius: 12px;
      background: white;
      border: 1px solid #e2e8f0;
      align-self: flex-start;
    }

    .message.mine {
      align-self: flex-end;
      background: #dbeafe;
      border-color: #bfdbfe;
    }

    .message-author {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 4px;
    }

    .message-text {
      font-size: 14px;
      color: #0f172a;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .chat-empty {
      margin: auto;
      color: #94a3b8;
      font-size: 16px;
    }

    .chat-input {
      background: white;
      border-top: 1px solid #e2e8f0;
      padding: 12px 16px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .chat-input textarea {
      flex: 1;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      resize: none;
      min-height: 42px;
      max-height: 120px;
    }

    .chat-input button {
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .info-panel {
      background: white;
      border-left: 1px solid #e2e8f0;
      display: none;
      flex-direction: column;
    }

    .info-content {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 16px;
      overflow-y: auto;
      min-height: 0;
    }

    .info-link {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }

    .info-profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      background: #f8fafc;
    }

    .info-avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid #e2e8f0;
      background: white;
    }

    .info-name {
      font-weight: 700;
      font-size: 16px;
      color: #0f172a;
      text-decoration: none;
    }

    .info-age {
      font-size: 13px;
      color: #64748b;
    }

    .meeting-card {
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 14px;
      background: white;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .meeting-tag {
      align-self: flex-start;
      background: #fef3c7;
      color: #92400e;
      font-weight: 600;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
    }

    .meeting-title {
      font-weight: 700;
      font-size: 16px;
      color: #0f172a;
      text-decoration: none;
    }

    .meeting-meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 13px;
      color: #64748b;
    }

    .participants-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .participant-item {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #1e293b;
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      background: #fff;
    }

    .participant-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid #e2e8f0;
      background: #f1f5f9;
    }

    .participant-name {
      font-weight: 600;
      font-size: 14px;
    }

    .participant-age {
      font-size: 12px;
      color: #64748b;
    }

    .app.show-info {
      grid-template-columns: 320px 1fr 320px;
    }

    .app.show-info .info-panel {
      display: flex;
    }
  </style>
</head>
<body>
  <div class="app" id="chat-app">
    <aside class="sidebar">
      <div class="sidebar-header">Чаты</div>
      <div class="chat-list" id="chat-list"></div>
      <div class="sidebar-footer">
        Обратная связь:
        <a href="https://t.me/xamixfl" target="_blank" rel="noopener">t.me/xamixfl</a>
      </div>
    </aside>

    <main class="main">
      <div class="chat-header">
        <div class="chat-title" id="chat-title">Выберите чат</div>
        <a href="index.html" class="info-link">К ленте</a>
      </div>
      <div class="chat-body" id="chat-body">
        <div class="chat-empty">Нет выбранного чата</div>
      </div>
      <div class="chat-input">
        <textarea id="chat-input" placeholder="Сообщение..." disabled></textarea>
        <button id="chat-send" disabled>Отправить</button>
      </div>
    </main>

    <aside class="info-panel" id="info-panel">
      <div class="info-content" id="info-content"></div>
    </aside>
  </div>

  <script src="env.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
