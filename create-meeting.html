<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pulse — создать встречу</title>
    
    <link rel="icon" href="assets/logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
            padding: 10px 20px;
        }

        .page {
            max-width: 760px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 36px;
            font-weight: 800;
            color: #3b82f6;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo img {
            width: 32px;
            height: 32px;
            object-fit: cover;
        }

        .back-link {
            color: #64748b;
            text-decoration: none;
            font-weight: 600;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 28px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.05);
        }

        .title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #64748b;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: #475569;
        }

        .form-input,
        .form-textarea,
        .form-select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 2px solid #e2e8f0;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }

        .selected-interests {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 2px 0 10px;
            min-height: 0;
        }

        .selected-interests:empty {
            display: none;
        }

        .selected-interest-pill {
            background: #e2e8f0;
            color: #334155;
            border: none;
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 12px;
            line-height: 1;
            white-space: nowrap;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .selected-interest-pill:hover {
            background: #cbd5e1;
            color: #0f172a;
        }

        .selected-interest-pill::after {
            content: ' ×';
            font-weight: 700;
        }

        .categories-dropdown {
            position: relative;
        }

        .categories-trigger {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 10px;
            border: 2px solid #e2e8f0;
            background: #fff;
            font-size: 15px;
            color: #0f172a;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .categories-trigger:hover,
        .categories-trigger.open {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .categories-trigger-text {
            text-align: left;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .categories-trigger-icon {
            color: #64748b;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .categories-trigger.open .categories-trigger-icon {
            transform: rotate(180deg);
        }

        .categories-menu {
            position: absolute;
            top: calc(100% + 3px);
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
            z-index: 20;
            display: none;
        }

        .categories-menu.open {
            display: block;
        }

        .categories-search-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .categories-search-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .categories-list {
            max-height: 360px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-right: 4px;
        }

        .categories-empty {
            color: #64748b;
            font-size: 13px;
            padding: 10px;
            text-align: center;
        }

        .topic-filter-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-top: 6px;
            border-top: 1px solid #eef2f7;
        }

        .topic-filter-group:first-of-type {
            border-top: none;
            padding-top: 0;
        }

        .topic-filter-group-trigger {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            width: 100%;
            padding: 8px 4px 2px;
            background: transparent;
            border: none;
            cursor: pointer;
            text-align: left;
        }

        .topic-filter-group-trigger-main {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .topic-filter-group-icon {
            font-size: 18px;
            line-height: 1;
        }

        .topic-filter-group-title {
            font-size: 12px;
            font-weight: 800;
            color: #475569;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .topic-filter-group-arrow {
            color: #94a3b8;
            font-size: 11px;
            transition: transform 0.2s ease, color 0.2s ease;
        }

        .topic-filter-group.open .topic-filter-group-arrow {
            transform: rotate(180deg);
            color: #3b82f6;
        }

        .topic-filter-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .topic-filter-options[hidden] {
            display: none;
        }

        .category-option {
            display: inline-flex;
        }

        .category-radio {
            display: none;
        }

        .category-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 11px 16px;
            border: 1px solid #dbe4f0;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 15px;
            font-weight: 600;
            color: #334155;
            background: #fff;
        }

        .category-label:hover {
            border-color: #3b82f6;
            background: #f8fbff;
            color: #1d4ed8;
            transform: translateY(-1px);
        }

        .category-radio:checked + .category-label {
            border-color: #3b82f6;
            background: linear-gradient(180deg, #eff6ff 0%, #dbeafe 100%);
            color: #1d4ed8;
            box-shadow: 0 10px 24px rgba(59, 130, 246, 0.12);
        }

        .category-icon {
            font-size: 18px;
        }

        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .expires-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 6px;
        }

        @media (max-width: 700px) {
            .expires-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 700px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .hint {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 6px;
        }

        .btn {
            width: 100%;
            background: #3b82f6;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #2563eb;
        }

        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 14px 20px;
            border-radius: 10px;
            display: none;
        }

        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 13px;
            color: #64748b;
        }

        .footer a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .lifetime-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
        }

        .lifetime-option {
            display: inline-flex;
            cursor: pointer;
            user-select: none;
        }

        .lifetime-option input[type="radio"] {
            display: none;
        }

        .lifetime-option span {
            display: inline-block;
            padding: 10px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            color: #64748b;
            background: white;
            transition: all 0.2s;
        }

        .lifetime-option input[type="radio"]:checked+span {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }

        .lifetime-option:hover span {
            border-color: #3b82f6;
            color: #3b82f6;
        }

        .lifetime-option input[type="radio"]:checked+span:hover {
            background: #2563eb;
            border-color: #2563eb;
            color: white;
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="header">
            <a href="index.html" class="logo">
                pulse
            </a>
            <a href="index.html" class="back-link">← К ленте</a>
        </div>

        <div class="card">
            <div class="title">Создать встречу</div>
            <div class="subtitle">Заполни основные данные, и встреча появится в ленте.</div>

            <form id="create-meeting-form">
                <div class="form-group">
                    <label class="form-label" for="meeting-headline">Запись для ленты *</label>
                    <textarea id="meeting-headline" class="form-textarea"
                        placeholder="Например: Ищем пару человек на вечер настолок — уютно, без спешки."
                        required></textarea>
                    <div class="hint">Эта запись будет видна в ленте как короткое описание.</div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="meeting-topic">Категория *</label>
                    <div class="selected-interests" id="meeting-selected-topic"></div>
                    <div class="categories-dropdown" id="meeting-categories-dropdown">
                        <button type="button" class="categories-trigger" id="meeting-categories-trigger" aria-expanded="false">
                            <span class="categories-trigger-text" id="meeting-categories-trigger-text">Выберите категорию</span>
                            <span class="categories-trigger-icon">▼</span>
                        </button>
                        <div class="categories-menu" id="meeting-categories-menu">
                            <input type="text" id="meeting-categories-search" class="categories-search-input" placeholder="Поиск категорий...">
                            <div class="categories-list" id="meeting-categories-container"></div>
                            <div class="categories-empty" id="meeting-categories-empty" style="display: none;">Ничего не найдено</div>
                        </div>
                    </div>
                    <input type="hidden" id="meeting-topic" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="meeting-max-slots">Количество участников *</label>
                        <input type="number" id="meeting-max-slots" class="form-input" min="2" max="50"
                            placeholder="Например: 6" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Время жизни *</label>
                        <div class="expires-grid">
                            <input type="date" id="meeting-expires-date" class="form-input" required>
                            <select id="meeting-expires-time" class="form-select" required></select>
                        </div>
                        <div class="hint" id="expires-hint">Можно выбрать только в пределах 72 часов.</div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="meeting-city">Город, район *</label>
                    <input type="text" id="meeting-city" class="form-input" placeholder="Например: Москва, Хамовники"
                        required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="meeting-details">Подробное описание *</label>
                    <textarea id="meeting-details" class="form-textarea"
                        placeholder="Расскажи подробнее: правила, формат, что взять с собой и т.д." required></textarea>
                </div>

                <button type="submit" class="btn">Опубликовать встречу</button>
            </form>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <footer class="footer">
        Обратная связь в Telegram:
        <a href="https://t.me/Pu1seApp" target="_blank" rel="noopener">t.me/Pu1seApp</a>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/beta-disclaimer.js"></script>
    <script src="js/create-meeting.js?v=20260324"></script>
</body>

</html>
