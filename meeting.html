<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetup — Встреча</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
            padding: 30px 20px;
        }
        
        .page {
            max-width: 980px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        
        .logo {
            font-size: 28px;
            font-weight: 800;
            color: #3b82f6;
            text-decoration: none;
        }
        
        .back-link {
            color: #64748b;
            text-decoration: none;
            font-weight: 600;
        }
        
        .meeting-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
        }
        
        @media (max-width: 900px) {
            .meeting-layout {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 6px 18px rgba(0,0,0,0.05);
        }
        
        .tag-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        
        .tag {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            background: #dbeafe;
            color: #1d4ed8;
        }
        
        .city {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #64748b;
            font-weight: 600;
            font-size: 13px;
        }
        
        .headline {
            font-size: 22px;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 16px;
        }
        
        .details-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .details-text {
            color: #64748b;
            line-height: 1.7;
            font-size: 15px;
            margin-bottom: 24px;
        }
        
        .join-btn {
            width: 100%;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px 20px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .join-btn:hover {
            background: #059669;
        }
        
        .side-block {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .creator {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .creator-avatar {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #475569;
            overflow: hidden;
        }
        
        .creator-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .creator-name {
            font-size: 16px;
            font-weight: 700;
            color: #1e293b;
            text-decoration: none;
        }
        
        .creator-name:hover {
            text-decoration: underline;
        }
        
        .creator-age {
            color: #64748b;
            font-size: 14px;
        }
        
        .participants {
            background: #f1f5f9;
            padding: 12px 14px;
            border-radius: 12px;
            font-weight: 600;
            color: #475569;
        }
        
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 14px 20px;
            border-radius: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <a href="index.html" class="logo">MEETUP</a>
            <a href="index.html" class="back-link">← К ленте</a>
        </div>
        
        <div class="meeting-layout">
            <div class="card">
                <div class="tag-row">
                    <div id="meeting-tag" class="tag">#Встреча</div>
                    <div id="meeting-city" class="city">📍 Город</div>
                </div>
                <div id="meeting-headline" class="headline">Заголовок встречи</div>
                
                <div class="details-title">Подробное описание</div>
                <div id="meeting-details" class="details-text">Описание встречи появится здесь.</div>
                
                <button id="join-button" class="join-btn">Присоединиться к встрече</button>
            </div>
            
            <div class="side-block">
                <div class="card">
                    <div class="creator">
                        <div class="creator-avatar" id="creator-avatar">A</div>
                        <div>
                            <a id="creator-name" class="creator-name" href="profile.html">Автор встречи</a>
                            <div id="creator-age" class="creator-age">Возраст не указан</div>
                        </div>
                    </div>
                </div>
                <div class="card participants" id="participants-info">👥 0/0 участников</div>
            </div>
        </div>
    </div>
    
    <div id="notification" class="notification"></div>
    
    <script src="env.js"></script>
    <script src="js/meeting.js"></script>
</body>
</html>
