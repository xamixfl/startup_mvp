<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pulse — встреча</title>
    
    <link rel="icon" href="assets/logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
            padding: 10px 20px;
        }
        
        .page {
            max-width: 980px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .logo {
            font-size: 36px;
            font-weight: 800;
            color: #3b82f6;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo img {
            width: 32px;
            height: 32px;
            object-fit: cover;
        }
        
        .back-link {
            color: #64748b;
            text-decoration: none;
            font-weight: 600;
        }
        
        .meeting-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
        }
        
        @media (max-width: 900px) {
            .meeting-layout {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 6px 18px rgba(0,0,0,0.05);
        }
        
        .tag-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 14px;
            position: relative;
        }

        .owner-actions {
            margin-left: auto;
            position: relative;
            display: none;
        }

        .owner-menu-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background: white;
            cursor: pointer;
            font-weight: 800;
            color: #334155;
            transition: background 0.2s, border-color 0.2s;
        }

        .owner-menu-btn:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
        }

        .owner-menu {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
            padding: 8px;
            display: none;
            flex-direction: column;
            gap: 6px;
            z-index: 50;
            min-width: 190px;
        }

        .owner-menu.open {
            display: flex;
        }

        .owner-menu-item {
            width: 100%;
            text-align: left;
            border: 0;
            background: transparent;
            padding: 10px 10px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            color: #334155;
            font-size: 14px;
            transition: background 0.2s;
        }

        .owner-menu-item:hover {
            background: #f1f5f9;
        }

        .owner-menu-item.danger {
            color: #b91c1c;
        }
        
        .tag {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            background: #dbeafe;
            color: #1d4ed8;
        }
        
        .city {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #64748b;
            font-weight: 600;
            font-size: 13px;
        }

        .location-icon {
            width: 14px;
            height: 14px;
            flex: 0 0 14px;
            display: inline-block;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none'><path d='M12 22s7-7 7-12a7 7 0 10-14 0c0 5 7 12 7 12z' fill='%23e11d48'/><circle cx='12' cy='10' r='3.2' fill='%23f8fafc'/></svg>");
        }
        
        .headline {
            font-size: 22px;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 16px;
        }
        
        .details-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .details-text {
            color: #64748b;
            line-height: 1.7;
            font-size: 15px;
            margin-bottom: 24px;
        }
        
        .join-btn {
            width: 100%;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px 20px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .join-btn:hover {
            background: #059669;
        }

        .join-unavailable {
            display: none;
            width: 100%;
            padding: 14px 20px;
            border-radius: 12px;
            background: #f1f5f9;
            color: #64748b;
            font-weight: 700;
            text-align: center;
        }
        
        .side-block {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .creator {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .creator-avatar {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #475569;
            overflow: hidden;
        }
        
        .creator-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        .creator-name {
            font-size: 16px;
            font-weight: 700;
            color: #1e293b;
            text-decoration: none;
        }
        
        .creator-name:hover {
            text-decoration: underline;
        }
        
        .creator-age {
            color: #64748b;
            font-size: 14px;
        }

        .meeting-countdown {
            margin: 18px 0 0;
            font-size: 14px;
            color: #0f172a;
            font-weight: 600;
        }
        
        .participants {
            background: #f1f5f9;
            padding: 12px 14px;
            border-radius: 12px;
            font-weight: 600;
            color: #475569;
        }

        .btn-secondary {
            width: 100%;
            background: #f1f5f9;
            color: #475569;
            border: none;
            border-radius: 12px;
            padding: 12px 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .request-item {
            display: flex;
            flex-direction: column;
            gap: 14px;
            align-items: stretch;
            padding: 14px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.05);
        }

        .request-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            min-width: 0;
        }

        .request-person {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .request-person a {
            color: #0f172a;
            font-weight: 700;
            font-size: 18px;
            text-decoration: none;
            line-height: 1.25;
        }

        .request-person a:hover {
            color: #2563eb;
        }

        .request-caption {
            color: #64748b;
            font-size: 13px;
            line-height: 1.45;
        }

        .btn-approve,
        .btn-reject {
            border: none;
            border-radius: 14px;
            padding: 11px 14px;
            font-weight: 700;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Poppins', sans-serif;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, border-color 0.2s ease;
            width: 100%;
        }

        .btn-approve {
            background: linear-gradient(135deg, #22c55e 0%, #15803d 100%);
            color: white;
            box-shadow: 0 14px 28px rgba(21, 128, 61, 0.22);
        }

        .btn-approve:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 34px rgba(21, 128, 61, 0.28);
        }

        .btn-reject {
            background: linear-gradient(180deg, #ffffff 0%, #fff1f2 100%);
            color: #be123c;
            border: 1px solid #fecdd3;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.95);
        }

        .btn-reject:hover {
            transform: translateY(-1px);
            background: linear-gradient(180deg, #fff1f2 0%, #ffe4e6 100%);
            border-color: #fda4af;
        }
        
        .notification {
            position: fixed;
            right: 24px;
            bottom: 24px;
            max-width: min(360px, calc(100vw - 32px));
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.96) 0%, rgba(30, 41, 59, 0.94) 100%);
            color: #f8fafc;
            padding: 15px 18px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 22px 50px rgba(15, 23, 42, 0.3);
            backdrop-filter: blur(14px);
            display: none;
            font-weight: 600;
            line-height: 1.45;
            z-index: 500;
            transform: translateY(12px);
            opacity: 0;
            transition: opacity 0.24s ease, transform 0.24s ease;
        }

        .notification.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 640px) {
            .request-actions {
                grid-template-columns: 1fr;
            }

            .notification {
                right: 16px;
                left: 16px;
                bottom: 16px;
                max-width: none;
            }
        }

        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 13px;
            color: #64748b;
        }

        .footer a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .members-title {
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 10px;
        }

        .members-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .member-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            text-decoration: none;
            color: #0f172a;
            background: #fff;
        }

        .member-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .member-row .member-item {
            flex: 1;
        }

        .member-item.owner {
            border-color: #93c5fd;
            background: #eff6ff;
        }

        .member-avatar {
            width: 38px;
            height: 38px;
            border-radius: 999px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            background: #f1f5f9;
            flex: 0 0 38px;
        }

        .member-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .member-name {
            font-weight: 700;
            font-size: 14px;
        }

        .member-sub {
            font-size: 12px;
            color: #64748b;
            margin-top: 2px;
        }

        .member-badge {
            margin-left: auto;
            font-size: 11px;
            font-weight: 900;
            padding: 3px 8px;
            border-radius: 999px;
            background: #dbeafe;
            color: #1d4ed8;
            white-space: nowrap;
        }

        .member-remove {
            border: none;
            border-radius: 10px;
            background: #fee2e2;
            color: #b91c1c;
            padding: 8px 10px;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            white-space: nowrap;
        }

        .member-remove:hover {
            background: #fecaca;
        }

        @media (max-width: 760px) {
            body {
                padding: 8px 12px 20px;
            }

            .header {
                align-items: flex-start;
                flex-direction: column;
                gap: 10px;
                margin-bottom: 16px;
            }

            .logo {
                font-size: 30px;
            }

            .back-link {
                display: inline-flex;
                align-items: center;
                min-height: 42px;
            }

            .card {
                padding: 16px;
                border-radius: 18px;
            }

            .tag-row {
                flex-wrap: wrap;
                gap: 10px;
                align-items: flex-start;
            }

            .tag,
            .city {
                max-width: 100%;
            }

            .owner-actions {
                margin-left: auto;
            }

            .headline {
                font-size: 26px;
                line-height: 1.15;
            }

            .meeting-countdown,
            .join-btn,
            .join-unavailable,
            #open-chat-btn,
            #leave-chat-btn {
                width: 100%;
            }

            .side-block {
                gap: 12px;
            }

            .creator {
                align-items: center;
            }

            .member-row {
                flex-direction: column;
                align-items: stretch;
            }

            .member-remove {
                width: 100%;
            }

            .footer {
                margin-top: 24px;
                padding-bottom: calc(10px + env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <a href="index.html" class="logo">
                pulse
            </a>
            <a href="index.html" class="back-link">← К ленте</a>
        </div>
        
        <div class="meeting-layout">
            <div class="card">
                <div class="tag-row">
                    <div id="meeting-tag" class="tag">#Встреча</div>
                    <div id="meeting-city" class="city"><span class="location-icon" aria-hidden="true"></span>Город</div>
                    <div class="owner-actions" id="owner-actions">
                        <button type="button" class="owner-menu-btn" id="owner-menu-btn" aria-label="Меню">⋮</button>
                        <div class="owner-menu" id="owner-menu" role="menu" aria-label="Действия">
                            <button type="button" class="owner-menu-item" id="owner-edit-btn">✏️ Редактировать</button>
                            <button type="button" class="owner-menu-item danger" id="owner-delete-btn">🗑️ Удалить встречу</button>
                        </div>
                    </div>
                </div>
                <div id="meeting-headline" class="headline">Заголовок встречи</div>
                <div id="meeting-details" class="details-text">Описание встречи появится здесь.</div>
                <div id="meeting-countdown" class="meeting-countdown"></div>
                
                <button id="join-button" class="join-btn">Присоединиться к встрече</button>
                <div id="join-unavailable" class="join-unavailable">Свободных мест сейчас нет</div>
            </div>
            
            <div class="side-block">
                <div class="card">
                    <div class="creator">
                        <div class="creator-avatar" id="creator-avatar">A</div>
                        <div>
                            <a id="creator-name" class="creator-name" href="profile.html">Автор встречи</a>
                            <div id="creator-age" class="creator-age">Возраст не указан</div>
                        </div>
                    </div>
                </div>
                <div class="card participants" id="participants-info">👥 0/0 участников</div>
                <div class="card" id="participants-list-card" style="display: none;">
                    <div class="members-title">Участники</div>
                    <div id="participants-list" class="members-list"></div>
                </div>
                <div class="card" id="join-status-card" style="display: none;">
                    <div class="details-title">Статус участия</div>
                    <div id="join-status-text" class="details-text" style="margin-bottom: 0;">—</div>
                    <button id="open-chat-btn" class="btn-secondary" style="display: none; margin-top: 12px;">Открыть чат</button>
                    <button id="leave-chat-btn" class="btn-secondary" style="display: none; margin-top: 12px;">Покинуть чат</button>
                </div>
                <div class="card" id="requests-card" style="display: none;">
                    <div class="details-title">Заявки в чат</div>
                    <div id="requests-list" class="details-text" style="margin-bottom: 0;"></div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="notification" class="notification"></div>

    <footer class="footer">
        Обратная связь в Telegram:
        <a href="https://t.me/Pu1seApp" target="_blank" rel="noopener">t.me/Pu1seApp</a>
    </footer>
    
    <script src="js/api.js"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/beta-disclaimer.js"></script>
    <script src="js/meeting.js"></script>
</body>
</html>
