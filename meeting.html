<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pulse — встреча</title>
    
    <link rel="icon" href="assets/logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
            padding: 10px 20px;
        }
        
        .page {
            max-width: 980px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .logo {
            font-size: 36px;
            font-weight: 800;
            color: #3b82f6;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo img {
            width: 32px;
            height: 32px;
            object-fit: cover;
        }
        
        .back-link {
            color: #64748b;
            text-decoration: none;
            font-weight: 600;
        }
        
        .meeting-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
        }
        
        @media (max-width: 900px) {
            .meeting-layout {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 6px 18px rgba(0,0,0,0.05);
        }
        
        .tag-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 14px;
            position: relative;
        }

        .owner-actions {
            margin-left: auto;
            position: relative;
            display: none;
        }

        .owner-menu-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background: white;
            cursor: pointer;
            font-weight: 800;
            color: #334155;
            transition: background 0.2s, border-color 0.2s;
        }

        .owner-menu-btn:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
        }

        .owner-menu {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
            padding: 8px;
            display: none;
            flex-direction: column;
            gap: 6px;
            z-index: 50;
            min-width: 190px;
        }

        .owner-menu.open {
            display: flex;
        }

        .owner-menu-item {
            width: 100%;
            text-align: left;
            border: 0;
            background: transparent;
            padding: 10px 10px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            color: #334155;
            font-size: 14px;
            transition: background 0.2s;
        }

        .owner-menu-item:hover {
            background: #f1f5f9;
        }

        .owner-menu-item.danger {
            color: #b91c1c;
        }
        
        .tag {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            background: #dbeafe;
            color: #1d4ed8;
        }
        
        .city {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #64748b;
            font-weight: 600;
            font-size: 13px;
        }

        .location-icon {
            width: 14px;
            height: 14px;
            flex: 0 0 14px;
            display: inline-block;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none'><path d='M12 22s7-7 7-12a7 7 0 10-14 0c0 5 7 12 7 12z' fill='%23e11d48'/><circle cx='12' cy='10' r='3.2' fill='%23f8fafc'/></svg>");
        }
        
        .headline {
            font-size: 22px;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 16px;
        }
        
        .details-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .details-text {
            color: #64748b;
            line-height: 1.7;
            font-size: 15px;
            margin-bottom: 24px;
        }
        
        .join-btn {
            width: 100%;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px 20px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .join-btn:hover {
            background: #059669;
        }
        
        .side-block {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .creator {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .creator-avatar {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #475569;
            overflow: hidden;
        }
        
        .creator-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        .creator-name {
            font-size: 16px;
            font-weight: 700;
            color: #1e293b;
            text-decoration: none;
        }
        
        .creator-name:hover {
            text-decoration: underline;
        }
        
        .creator-age {
            color: #64748b;
            font-size: 14px;
        }
        
        .participants {
            background: #f1f5f9;
            padding: 12px 14px;
            border-radius: 12px;
            font-weight: 600;
            color: #475569;
        }

        .btn-secondary {
            width: 100%;
            background: #f1f5f9;
            color: #475569;
            border: none;
            border-radius: 12px;
            padding: 12px 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .request-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .request-actions {
            display: flex;
            gap: 8px;
        }

        .btn-approve,
        .btn-reject {
            border: none;
            border-radius: 8px;
            padding: 6px 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-approve {
            background: #10b981;
            color: white;
        }

        .btn-reject {
            background: #fee2e2;
            color: #b91c1c;
        }
        
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 14px 20px;
            border-radius: 10px;
            display: none;
        }

        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 13px;
            color: #64748b;
        }

        .footer a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <a href="index.html" class="logo">
                pulse
            </a>
            <a href="index.html" class="back-link">← К ленте</a>
        </div>
        
        <div class="meeting-layout">
            <div class="card">
                <div class="tag-row">
                    <div id="meeting-tag" class="tag">#Встреча</div>
                    <div id="meeting-city" class="city"><span class="location-icon" aria-hidden="true"></span>Город</div>
                    <div class="owner-actions" id="owner-actions">
                        <button type="button" class="owner-menu-btn" id="owner-menu-btn" aria-label="Меню">⋮</button>
                        <div class="owner-menu" id="owner-menu" role="menu" aria-label="Действия">
                            <button type="button" class="owner-menu-item" id="owner-edit-btn">✏️ Редактировать</button>
                            <button type="button" class="owner-menu-item danger" id="owner-delete-btn">🗑️ Удалить встречу</button>
                        </div>
                    </div>
                </div>
                <div id="meeting-headline" class="headline">Заголовок встречи</div>
                
                <div class="details-title">Подробное описание</div>
                <div id="meeting-details" class="details-text">Описание встречи появится здесь.</div>
                
                <button id="join-button" class="join-btn">Присоединиться к встрече</button>
            </div>
            
            <div class="side-block">
                <div class="card">
                    <div class="creator">
                        <div class="creator-avatar" id="creator-avatar">A</div>
                        <div>
                            <a id="creator-name" class="creator-name" href="profile.html">Автор встречи</a>
                            <div id="creator-age" class="creator-age">Возраст не указан</div>
                        </div>
                    </div>
                </div>
                <div class="card participants" id="participants-info">👥 0/0 участников</div>
                <div class="card" id="join-status-card" style="display: none;">
                    <div class="details-title">Статус участия</div>
                    <div id="join-status-text" class="details-text" style="margin-bottom: 0;">—</div>
                    <button id="open-chat-btn" class="btn-secondary" style="display: none; margin-top: 12px;">Открыть чат</button>
                    <button id="leave-chat-btn" class="btn-secondary" style="display: none; margin-top: 12px;">Покинуть чат</button>
                </div>
                <div class="card" id="requests-card" style="display: none;">
                    <div class="details-title">Заявки в чат</div>
                    <div id="requests-list" class="details-text" style="margin-bottom: 0;"></div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="notification" class="notification"></div>

    <footer class="footer">
        Обратная связь в Telegram:
        <a href="https://t.me/Pu1seApp" target="_blank" rel="noopener">t.me/Pu1seApp</a>
    </footer>
    
    <script src="js/api.js"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/meeting.js"></script>
</body>
</html>
