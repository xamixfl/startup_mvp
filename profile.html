<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetup — Профиль</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
            padding: 30px 20px;
        }
        
        .page {
            max-width: 980px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        
        .logo {
            font-size: 28px;
            font-weight: 800;
            color: #3b82f6;
            text-decoration: none;
        }
        
        .back-link {
            color: #64748b;
            text-decoration: none;
            font-weight: 600;
        }
        
        .layout {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 24px;
        }
        
        @media (max-width: 900px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 6px 18px rgba(0,0,0,0.05);
        }
        
        .profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 12px;
        }
        
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #475569;
            overflow: hidden;
            font-size: 40px;
        }
        
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .name {
            font-size: 22px;
            font-weight: 800;
        }
        
        .meta {
            color: #64748b;
            font-weight: 600;
        }
        
        .interests {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        
        .interest-pill {
            background: #e2e8f0;
            color: #475569;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        
        .meeting-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        
        .meeting-item {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        
        .meeting-item:hover {
            border-color: #3b82f6;
            box-shadow: 0 8px 18px rgba(59, 130, 246, 0.08);
        }
        
        .meeting-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 700;
            color: #1d4ed8;
            background: #dbeafe;
            padding: 4px 10px;
            border-radius: 999px;
            width: fit-content;
        }
        
        .meeting-headline {
            font-size: 16px;
            font-weight: 700;
        }
        
        .meeting-info {
            font-size: 13px;
            color: #64748b;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <a href="index.html" class="logo">MEETUP</a>
            <a href="index.html" class="back-link">← К ленте</a>
        </div>
        
        <div class="layout">
            <div class="card profile">
                <div id="profile-avatar" class="avatar">A</div>
                <div id="profile-name" class="name">Пользователь</div>
                <div id="profile-meta" class="meta">Возраст не указан</div>
                <div id="profile-city" class="meta">Город не указан</div>
                <div id="profile-interests" class="interests"></div>
            </div>
            
            <div class="card">
                <div class="section-title">Запланированные встречи</div>
                <div id="meeting-list" class="meeting-list"></div>
            </div>
        </div>
    </div>
    
    <script src="env.js"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
