# Example nginx site config for Pulse (frontend + API + uploads)
#
# Goals:
# - Serve static HTML/JS/CSS from the repo root (or a build folder)
# - Proxy /api/* to Node/Express
# - Proxy /uploads/* to Node/Express (so avatars/chat images work)
#
# Adjust:
# - `root` path
# - `server_name`
# - Node port (default 3000)

server {
  listen 80;
  server_name _;

  root /var/www/pulse;   # path to startup_mvp repo root on your server
  index index.html;

  location /api/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /uploads/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ =404;
  }
}

