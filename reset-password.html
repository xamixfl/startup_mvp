<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pulse — новый пароль</title>

    <link rel="icon" href="assets/logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 40px;
        }

        .logo {
            display: block;
            text-align: center;
            text-decoration: none;
            color: #3b82f6;
            font-size: 40px;
            font-weight: 800;
            margin-bottom: 24px;
        }

        .page-title {
            text-align: center;
            font-size: 24px;
            margin-bottom: 24px;
        }

        .message {
            display: none;
            margin-bottom: 18px;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid transparent;
            font-size: 14px;
            line-height: 1.5;
        }

        .message.success {
            display: block;
            background: #d1fae5;
            color: #065f46;
            border-color: #a7f3d0;
        }

        .message.error {
            display: block;
            background: #fee2e2;
            color: #991b1b;
            border-color: #fecaca;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #475569;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
        }

        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .error-message {
            min-height: 20px;
            margin-top: 6px;
            color: #ef4444;
            font-size: 14px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #3b82f6;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .footer-link {
            margin-top: 18px;
            text-align: center;
            font-size: 14px;
        }

        .footer-link a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo">pulse</a>
        <h1 class="page-title">Новый пароль</h1>
        <div id="message" class="message"></div>

        <form id="reset-form">
            <div class="form-group">
                <label class="form-label">Новый пароль</label>
                <input type="password" id="password" class="form-input" placeholder="Минимум 6 символов" required>
                <div id="password-error" class="error-message"></div>
            </div>

            <div class="form-group">
                <label class="form-label">Повторите пароль</label>
                <input type="password" id="password-confirm" class="form-input" placeholder="Повторите пароль" required>
                <div id="password-confirm-error" class="error-message"></div>
            </div>

            <button type="submit" id="reset-btn" class="btn">Сохранить пароль</button>
        </form>

        <div class="footer-link">
            <a href="login.html">Вернуться ко входу</a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/reset-password.js"></script>
</body>
</html>
